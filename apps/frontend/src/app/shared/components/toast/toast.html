<div class="toast-stack">
  @for (notification of notificationService.notifications(); track notification.id) {
    <div
      class="toast"
      [class.toast--success]="notification.level === 'success'"
      [class.toast--error]="notification.level === 'error'"
      role="status"
    >
      <span class="toast__icon" [class.toast__icon--error]="notification.level === 'error'" aria-hidden="true">
        {{ notification.level === 'error' ? '!' : '✓' }}
      </span>
      <span class="toast__message">{{ notification.message }}</span>
      <button type="button" (click)="notificationService.dismiss(notification.id)" aria-label="Fermer la notification">×</button>
    </div>
  }
</div>
