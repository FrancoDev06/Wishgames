<div class="donut-chart">
  <svg
    class="donut-chart__svg"
    viewBox="0 0 100 100"
    role="img"
    [attr.aria-label]="'Répartition : ' + slices.map(s => s.label + ' ' + s.value).join(', ')"
  >
    <circle class="donut-chart__track" cx="50" cy="50" [attr.r]="radius" />
    @for (segment of segments; track segment.label) {
      <circle
        class="donut-chart__segment"
        cx="50"
        cy="50"
        [attr.r]="radius"
        [style.stroke]="'var(' + segment.colorVar + ')'"
        [attr.stroke-dasharray]="segment.dashArray"
        [attr.stroke-dashoffset]="segment.dashOffset"
      />
    }
  </svg>

  <ul class="donut-chart__legend">
    @for (segment of segments; track segment.label) {
      <li class="donut-chart__legend-item">
        <span class="donut-chart__legend-dot" [style.background]="'var(' + segment.colorVar + ')'"></span>
        <span class="donut-chart__legend-label">{{ segment.label }}</span>
        <span class="donut-chart__legend-value">{{ segment.value }} · {{ segment.percent }}%</span>
      </li>
    }
  </ul>
</div>
