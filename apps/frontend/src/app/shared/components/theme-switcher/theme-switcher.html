<div class="theme-switcher" role="radiogroup" aria-label="Choix du thème">
  @for (option of themeService.themes; track option.id) {
    <button
      type="button"
      class="theme-switcher__option"
      role="radio"
      [attr.aria-checked]="themeService.theme() === option.id"
      [class.theme-switcher__option--active]="themeService.theme() === option.id"
      (click)="themeService.setTheme(option.id)"
    >
      {{ option.label }}
    </button>
  }
</div>
